# One-command local run of the WHOLE app — frontend, backend, MongoDB, Redis.
# This is the file plain `docker compose up` uses: Compose prefers
# compose.yaml over docker-compose.yml when both exist in the same directory
# (you'll see a one-line "Using compose.yaml" notice — that's expected, not
# an error). This is NOT that other file.
#
# There are two compose files in this repo, for two different jobs:
#   - compose.yaml (this file)   → the actual app, one backend instance, for
#                                   trying DevCollab out or day-to-day local dev.
#   - docker-compose.yml         → a multi-instance TEST RIG (two backend
#                                   containers behind nginx + Redis pub/sub) used
#                                   to verify real-time sync survives running more
#                                   than one backend instance, and for load
#                                   testing (see load-test/README.md). Since it's
#                                   not the file Compose picks by default anymore,
#                                   run it explicitly: `docker compose -f docker-compose.yml up --build`
#
# Usage:
#   cp .env.example .env      # then fill in JUDGE0_KEY / GEMINI_API_KEY if you want those features
#   docker compose up --build
#
#   frontend → http://localhost:5173
#   backend  → http://localhost:5000
#
# JWT_SECRET/JUDGE0_KEY/GEMINI_API_KEY come from .env in this directory (see
# .env.example) — MONGODB_URI/REDIS_URL default to the bundled mongo/redis
# containers below and normally don't need to be touched.

# Explicit project name (not left to default to the directory name) so this
# stack's containers/network never collide with docker-compose.yml's, even
# if both happen to be run from this same directory at some point.
name: devcollab

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      # mongosh itself is slow to spin up (it's a Node process), so give it
      # more than 5s or the check times out even though mongod is fine.
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 20s

  redis:
    image: redis:7-alpine
    # No host port published — only the backend needs this, over the compose
    # network (redis:6379). With a single backend instance Redis isn't load-
    # bearing (see attachRedisAdapter() in backend/src/server.js — it's a
    # no-op pass-through with only one instance), it's included so the local
    # stack matches the real deploy topology and so JUDGE0_KEY-free /
    # GEMINI_API_KEY-free first runs still exercise the same Redis code path.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/devcollab}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env — copy .env.example to .env first}
      CLIENT_URL: http://localhost:5173
      JUDGE0_KEY: ${JUDGE0_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000
      VITE_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend

volumes:
  mongo-data:
