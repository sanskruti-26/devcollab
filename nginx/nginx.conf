worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Logs which backend instance actually served each request — the whole
    # point of this compose file is to see that in action.
    log_format upstream_debug '$remote_addr - "$request" -> $upstream_addr ($status)';
    access_log /dev/stdout upstream_debug;

    # Round-robin (default, no "ip_hash"/"sticky") is deliberate here — the
    # frontend socket client forces transports:['websocket'] (see
    # frontend/src/lib/socket.js), so each browser tab is a single long-lived
    # connection with no polling handshake beforehand. That means we don't
    # need session affinity: nginx just needs to pick *a* backend per new
    # connection, and each browser tab will land on whichever one comes up
    # next in rotation.
    upstream backend_pool {
        server backend1:5000;
        server backend2:5000;
    }

    server {
        listen 80;

        # Socket.io handshake + WebSocket upgrade
        location /socket.io/ {
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /api/ {
            proxy_pass http://backend_pool;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://backend_pool;
        }
    }
}
