
# Local multi-instance test rig — NOT the deploy topology (that's Vercel +
# Render, see README). This exists to manually verify that real-time co-editing
# still works once you're running more than one backend instance: two backend
# containers behind an nginx round-robin, sharing Mongo for persistence and
# Redis so Socket.io broadcasts reach sockets connected to the *other*
# instance (see attachRedisAdapter() in backend/src/server.js).
#
# Usage: docker compose up --build
#   frontend  → http://localhost:5173
#   nginx     → http://localhost:8080 (what the frontend actually talks to)
#   backend1  → http://localhost:5001 (direct, for debugging which instance did what)
#   backend2  → http://localhost:5002 (direct, for debugging which instance did what)
#
# To specifically check the Redis pub/sub fix for concurrent cross-instance
# edits (see services/roomService.js), once mongo/redis/backend1/backend2 are
# up: `cd backend && npm run verify:multi-instance`

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      # mongosh itself is slow to spin up (it's a Node process), so give it
      # more than 5s or the check times out even though mongod is fine —
      # verified by mongod's own logs saying "Waiting for connections" while
      # this healthcheck was still reporting "exceeded timeout".
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 20s

  redis:
    image: redis:7-alpine
    # No host port published — only backend1/backend2 need this, over the
    # compose network (redis:6379). Avoids clashing with any Redis you might
    # already have bound to host port 6379 outside this stack.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend1:
    build: ./backend
    ports:
      - "5001:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/devcollab
      REDIS_URL: redis://redis:6379
      # Must be identical across every backend instance — it signs/verifies
      # JWTs, so a token minted by backend1 has to validate on backend2 too.
      # Dev-only value; never reuse this for anything real.
      JWT_SECRET: devcollab_docker_compose_dev_secret_do_not_use_in_prod
      CLIENT_URL: http://localhost:5173
      JUDGE0_KEY: ${JUDGE0_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend2:
    build: ./backend
    ports:
      - "5002:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/devcollab
      REDIS_URL: redis://redis:6379
      JWT_SECRET: devcollab_docker_compose_dev_secret_do_not_use_in_prod
      CLIENT_URL: http://localhost:5173
      JUDGE0_KEY: ${JUDGE0_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_SOCKET_URL: http://localhost:8080
    depends_on:
      - nginx

volumes:
  mongo-data:
